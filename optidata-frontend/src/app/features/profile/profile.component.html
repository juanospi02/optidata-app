<!-- features/profile/profile.component.html — Página de perfil de usuario -->

<div class="profile-page">
  <div class="profile-container">

    <!-- ── Encabezado con avatar ─────────────────────────────────── -->
    <div class="profile-header">
      <div class="avatar-circle">{{ initials }}</div>
      <div class="header-info">
        <h1 class="header-title">Mi Perfil</h1>
        <p class="header-sub">{{ profile.email || 'Cargando...' }}</p>
      </div>
    </div>

    <!-- ── Sección: Datos personales ─────────────────────────────── -->
    <section class="profile-card">
      <div class="card-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <h2 class="card-title">Datos personales</h2>
      </div>

      <div class="form-grid">

        <!-- Nombre -->
        <div class="field-group">
          <label class="field-label" for="profileName">Nombre completo</label>
          <div class="input-wrap" [class.saving]="profileSaving" [class.saved]="profileSaved">
            <input
              id="profileName"
              type="text"
              class="field-input"
              [(ngModel)]="profile.name"
              (blur)="onProfileBlur()"
              placeholder="Tu nombre"
              autocomplete="name"
            />
            <!-- Indicador de estado al auto-guardar -->
            @if (profileSaving) {
              <span class="field-status saving-status">Guardando…</span>
            }
            @if (profileSaved && !profileSaving) {
              <span class="field-status saved-status">✓ Guardado</span>
            }
          </div>
        </div>

        <!-- Email -->
        <div class="field-group">
          <label class="field-label" for="profileEmail">Correo electrónico</label>
          <div class="input-wrap" [class.saving]="profileSaving" [class.saved]="profileSaved">
            <input
              id="profileEmail"
              type="email"
              class="field-input"
              [(ngModel)]="profile.email"
              (blur)="onProfileBlur()"
              placeholder="tu@correo.com"
              autocomplete="email"
            />
          </div>
        </div>

      </div>

      <p class="auto-save-hint">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Los cambios se guardan automáticamente al salir del campo.
      </p>
    </section>

    <!-- ── Sección: Cambio de contraseña ─────────────────────────── -->
    <section class="profile-card">
      <div class="card-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <h2 class="card-title">Cambiar contraseña</h2>
      </div>

      <div class="form-grid">

        <!-- Contraseña actual -->
        <div class="field-group full-width">
          <label class="field-label" for="currentPwd">Contraseña actual</label>
          <div class="input-wrap password-wrap">
            <input
              id="currentPwd"
              [type]="showCurrentPwd ? 'text' : 'password'"
              class="field-input"
              [(ngModel)]="passwords.current"
              placeholder="Contraseña actual"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-pwd" (click)="showCurrentPwd = !showCurrentPwd" title="Mostrar/ocultar">
              @if (showCurrentPwd) {
                <!-- Ojo tachado (ocultar) -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <!-- Ojo (mostrar) -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <!-- Nueva contraseña -->
        <div class="field-group">
          <label class="field-label" for="newPwd">Nueva contraseña</label>
          <div class="input-wrap password-wrap">
            <input
              id="newPwd"
              [type]="showNewPwd ? 'text' : 'password'"
              class="field-input"
              [(ngModel)]="passwords.new"
              placeholder="Mínimo 6 caracteres"
              autocomplete="new-password"
            />
            <button type="button" class="toggle-pwd" (click)="showNewPwd = !showNewPwd" title="Mostrar/ocultar">
              @if (showNewPwd) {
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <!-- Confirmar contraseña -->
        <div class="field-group">
          <label class="field-label" for="confirmPwd">Confirmar contraseña</label>
          <div class="input-wrap">
            <input
              id="confirmPwd"
              type="password"
              class="field-input"
              [(ngModel)]="passwords.confirm"
              placeholder="Repite la nueva contraseña"
              autocomplete="new-password"
            />
          </div>
        </div>

      </div>

      <!-- Botón de submit -->
      <div class="card-actions">
        <button
          class="btn-primary"
          (click)="submitPasswordChange()"
          [disabled]="passwordLoading"
        >
          @if (passwordLoading) {
            <span class="spinner"></span>
            Actualizando…
          } @else {
            Actualizar contraseña
          }
        </button>
      </div>
    </section>

    <!-- ── Enlace de retorno ──────────────────────────────────────── -->
    <div class="back-link">
      <a routerLink="/dashboard" class="link-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Volver al dashboard
      </a>
    </div>

  </div>
</div>
