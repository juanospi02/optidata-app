<div class="app-layout">

  <!-- Navbar (oculto en login/register) -->
  @if (!isAuthPage()) {
    <nav class="navbar">
      <div class="nav-inner">

        <!-- Brand -->
        <a routerLink="/dashboard" class="nav-brand">
          <div class="brand-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
          </div>
          <span class="brand-name">OptiData</span>
          <span class="brand-tag">Pricing</span>
        </a>

        <!-- Links -->
        <div class="nav-links">
          <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
            Dashboard
          </a>

          <a routerLink="/productos" routerLinkActive="active" class="nav-link">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            </svg>
            Productos
          </a>

          <a routerLink="/crear-producto" routerLinkActive="active" class="nav-link nav-link-cta">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Nuevo Producto
          </a>
        </div>

        <!-- Usuario + perfil + logout -->
        @if (auth.user()) {
          <div class="nav-user">
            <!-- Avatar clicable → perfil -->
            <a routerLink="/perfil" class="user-avatar-link" title="Ver perfil">
              <div class="user-avatar">{{ auth.user()!.name.charAt(0).toUpperCase() }}</div>
            </a>
            <div class="user-info">
              <a routerLink="/perfil" class="user-name">{{ auth.user()!.name }}</a>
              <span class="user-email">{{ auth.user()!.email }}</span>
            </div>
            <button class="btn-logout" (click)="logout()" title="Cerrar sesión">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
            </button>
          </div>
        }

      </div>
    </nav>
  }

  <!-- Contenido principal -->
  <main class="main-content" [class.no-nav]="isAuthPage()">
    <div [class.content-wrapper]="!isAuthPage()">
      <router-outlet />
    </div>
  </main>

  <!-- Toasts globales -->
  <app-toast />

</div>
